name: Daily recall ingest

on:
  schedule:
    - cron: "24 2 * * *" # 02:24 UTC daily - not on the hour, to avoid github load dropping scheduled job
  workflow_dispatch: {}

# Least privilege: these jobs hit an external API / external DB and only need to check out the repo.
permissions:
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      # Single source of truth: resolve secrets from the 1Password Developer vault via a read-only
      # service account (OP_SERVICE_ACCOUNT_TOKEN repo secret). export-env makes them available as
      # env vars to every step below — no per-step secrets.* plumbing.
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@581a835fb51b8e7ec56b71cf2ffddd7e68bb25e0 # v2.0.0
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          API_BASE_URL: op://Developer/API-Backend/API_BASE_URL
          INGEST_BEARER_TOKEN: op://Developer/API-Backend/INGEST_BEARER_TOKEN
          INTERNAL_DISPATCH_TOKEN: op://Developer/API-Backend/INTERNAL_DISPATCH_TOKEN

      - name: Trigger FDA ingest endpoint
        run: |
          curl --fail-with-body --silent --show-error \
            -X POST "${API_BASE_URL}/recalls/ingest/fda" \
            -H "Authorization: Bearer ${INGEST_BEARER_TOKEN}" \
            -H "Content-Type: application/json"

      - name: Trigger FSIS ingest endpoint
        run: |
          curl --fail-with-body --silent --show-error --max-time 300 \
            -X POST "${API_BASE_URL}/recalls/ingest/fsis" \
            -H "Authorization: Bearer ${INGEST_BEARER_TOKEN}" \
            -H "Content-Type: application/json"

      - name: Trigger UK FSA ingest endpoint
        run: |
          curl --fail-with-body --silent --show-error --max-time 300 \
            -X POST "${API_BASE_URL}/recalls/ingest/uk" \
            -H "Authorization: Bearer ${INGEST_BEARER_TOKEN}" \
            -H "Content-Type: application/json"

      - name: Trigger NCC (South Africa) ingest endpoint
        run: |
          curl --fail-with-body --silent --show-error --max-time 300 \
            -X POST "${API_BASE_URL}/recalls/ingest/ncc" \
            -H "Authorization: Bearer ${INGEST_BEARER_TOKEN}" \
            -H "Content-Type: application/json"

      - name: Trigger SA curated seed ingest endpoint
        run: |
          curl --fail-with-body --silent --show-error --max-time 120 \
            -X POST "${API_BASE_URL}/recalls/ingest/seed" \
            -H "Authorization: Bearer ${INGEST_BEARER_TOKEN}" \
            -H "Content-Type: application/json"

      - name: Trigger CFIA (Canada) ingest endpoint
        run: |
          curl --fail-with-body --silent --show-error --max-time 300 \
            -X POST "${API_BASE_URL}/recalls/ingest/cfia" \
            -H "Authorization: Bearer ${INGEST_BEARER_TOKEN}" \
            -H "Content-Type: application/json"

      - name: Dispatch recall alert emails
        # Runs only after every ingest above succeeds — a failed step short-circuits the job, so a
        # digest never claims completeness off a partial ingest (those recalls land next run).
        # Uses the INTERNAL_DISPATCH_TOKEN resolved from 1Password, matching the backend's env var.
        # --fail-with-body turns a non-2xx into a non-zero exit and --max-time 30 a timeout, so either
        # fails the step and surfaces via GitHub Actions notifications.
        run: |
          curl --fail-with-body --silent --show-error --max-time 30 \
            -X POST "${API_BASE_URL}/internal/dispatch-alerts" \
            -H "X-Internal-Token: ${INTERNAL_DISPATCH_TOKEN}" \
            -H "Content-Type: application/json"

  # Themes + similar-recall neighbours are a whole-corpus rebuild (TF-IDF + NMF), too heavy to run in
  # the API process — so this runs scripts.build_analytics directly against the live DB on the runner,
  # after the ingests above land their new recalls. DATABASE_URL resolves to the *external* Neon
  # connection string from 1Password (same value run-script.yml uses).
  rebuild-analytics:
    needs: ingest
    if: ${{ always() }} # rebuild even if a source ingest failed — the others may have added recalls
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@581a835fb51b8e7ec56b71cf2ffddd7e68bb25e0 # v2.0.0
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          DATABASE_URL: op://Developer/Neon-Postgres/CONNECTION_STRING
          INGEST_BEARER_TOKEN: op://Developer/API-Backend/INGEST_BEARER_TOKEN

      - name: Install dependencies
        # Base deps only (no dev/ml); constraints pin the ML stack to the versions the committed
        # model pickle was built with, matching run-script.yml.
        run: |
          python -m pip install --upgrade pip
          pip install -e "." -c constraints.txt

      - name: Rebuild analytics over the live DB
        run: python -m scripts.build_analytics

      - name: Rebuild events over the live DB
        # Event/outbreak clusters reuse the neighbour graph the previous step builds, so they run
        # right after it (same job → the analytics rebuild has already committed).
        run: python -m scripts.build_events

      - name: Rebuild stats over the live DB
        # Materializes the /recalls/stats payload per country so the API reads a row instead of
        # recomputing the aggregations + anomaly scan + forecast. Independent of analytics/events
        # (it reads only `recalls`), so it runs last and regardless of their outcome.
        if: ${{ always() }}
        run: python -m scripts.build_stats
