name: Daily recall ingest

on:
  schedule:
    - cron: '0 4 * * *' # 04:00 UTC daily
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ingest endpoint
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          INGEST_BEARER_TOKEN: ${{ secrets.INGEST_BEARER_TOKEN }}
        run: |
          curl --fail --silent --show-error \
            -X POST "${API_BASE_URL}/recalls/ingest" \
            -H "Authorization: Bearer ${INGEST_BEARER_TOKEN}" \
            -H "Content-Type: application/json"

      - name: Trigger FSIS ingest endpoint
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          INGEST_BEARER_TOKEN: ${{ secrets.INGEST_BEARER_TOKEN }}
        run: |
          curl --fail --silent --show-error --max-time 300 \
            -X POST "${API_BASE_URL}/recalls/ingest/fsis" \
            -H "Authorization: Bearer ${INGEST_BEARER_TOKEN}" \
            -H "Content-Type: application/json"
