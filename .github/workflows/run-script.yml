name: Run script on live DB

# Manual only — never on a schedule. Pick a script from the dropdown and it runs against the live
# database, so you don't have to run it from your laptop. The daily automated ingest lives in
# ingest.yml (which hits the API instead); this one runs the scripts/ modules directly.
#
# Secrets come from the 1Password Developer vault via a read-only service account (the
# OP_SERVICE_ACCOUNT_TOKEN repo secret): DATABASE_URL resolves to the live Neon connection string,
# and INGEST_BEARER_TOKEN is loaded too because app config requires it at import even though these
# scripts don't use it.
on:
  workflow_dispatch:
    inputs:
      script:
        description: "Which scripts.* module to run against the live DB"
        type: choice
        required: true
        default: ingest_all
        options:
          # Ingest — pull new recalls from the sources. Cadence: DAILY. Normally automated by
          # ingest.yml (which hits the API); run here to catch up a missed day or force a refresh.
          # ingest_all runs every source then rebuilds analytics; the others are single-source.
          - ingest_all
          - ingest_fda
          - ingest_fsis
          - ingest_uk
          - ingest_ncc
          - ingest_seed
          # Backfill — one-time seeding of already-stored rows. Cadence: ONCE on first setup, and
          # again right after a migration adds a derived column. New rows self-populate at ingest, so
          # these don't repeat. backfill_all runs only the ones still needed (status-gated).
          - backfill_all
          - backfill_fda # full openFDA history (~26k rows) — the initial corpus seed
          - backfill_entities # gazetteer entities over existing rows (after the entities migration)
          - backfill_severity # severity score/label over existing rows (after the severity migration)
          # Rebuild derived data over the whole stored corpus. Cadence: AS NEEDED, not scheduled.
          # reclassify: after training a new model or changing the gazetteer / severity rules.
          # build_analytics: refresh themes + similar-recall neighbours — ingest_all already does this
          # daily, so run standalone only after a one-off ingest or an analytics-param change.
          # build_events: refresh event/outbreak clusters — also daily via ingest_all; run standalone
          # only after build_analytics (it reuses the neighbours) or a clustering-param change.
          # build_stats: re-materialize the /recalls/stats payload — also daily via ingest_all; run
          # standalone after a one-off ingest so the cached stats aren't left stale until tomorrow.
          - reclassify
          - build_analytics
          - build_events
          - build_stats

# Least privilege: this job runs a script against the external DB and only needs to check out the repo.
permissions:
  contents: read

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@581a835fb51b8e7ec56b71cf2ffddd7e68bb25e0 # v2.0.0
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          DATABASE_URL: op://Developer/Neon-Postgres/CONNECTION_STRING
          INGEST_BEARER_TOKEN: op://Developer/API-Backend/INGEST_BEARER_TOKEN

      - name: Install dependencies
        # Base deps only (no dev/ml); constraints pin the ML stack to the versions the committed
        # model pickle was built with, so classify() can load it during ingest/reclassify.
        run: |
          python -m pip install --upgrade pip
          pip install -e "." -c constraints.txt

      - name: Run scripts.${{ inputs.script }}
        env:
          # DATABASE_URL + INGEST_BEARER_TOKEN are already in the env (exported by the 1Password
          # step above). Indirect the input through env rather than interpolating it into the shell,
          # so the run step can't be turned into a command-injection vector if this ever becomes a
          # free-form input.
          SCRIPT: ${{ inputs.script }}
        run: python -m "scripts.$SCRIPT"
